# Desafio adicional: expor a API fora do cluster sem port-forward
apiVersion: v1
kind: Service
metadata:
  name: desafio-api-nodeport
  namespace: desafio-api
  labels:
    app: desafio-api
spec:
  type: NodePort
  selector:
    app: desafio-api
  ports:
    - name: http
      port: 80
      targetPort: 3000
      nodePort: 30080
